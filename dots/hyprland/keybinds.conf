$mod = SUPER

# Apps
bind = $mod, Return, exec, foot
bind = $mod, T, exec, foot
bind = $mod, W, exec, zen-browser
bind = $mod, E, exec, nautilus
bind = $mod, Space, exec, fuzzel

# Window management
bind = $mod, Q, killactive,
bind = Alt, F4, killactive,
bind = $mod+Shift+Alt, Q, exec, hyprctl kill

# Layout
bind = $mod+Alt, Space, togglefloating,
bind = $mod, D, fullscreen, 1
bind = $mod, F, fullscreen, 0
bind = $mod, P, pin

# Focus (arrow keys)
bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d

# Focus (vim keys)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Move windows (arrow keys)
bind = $mod+Shift, Left, movewindow, l
bind = $mod+Shift, Right, movewindow, r
bind = $mod+Shift, Up, movewindow, u
bind = $mod+Shift, Down, movewindow, d

# Move windows (vim keys)
bind = $mod+Shift, H, movewindow, l
bind = $mod+Shift, L, movewindow, r
bind = $mod+Shift, K, movewindow, u
bind = $mod+Shift, J, movewindow, d

# Split ratio
binde = $mod, Comma, layoutmsg, splitratio -0.1
binde = $mod, Period, layoutmsg, splitratio +0.1

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to workspace
bind = $mod+Shift, 1, movetoworkspacesilent, 1
bind = $mod+Shift, 2, movetoworkspacesilent, 2
bind = $mod+Shift, 3, movetoworkspacesilent, 3
bind = $mod+Shift, 4, movetoworkspacesilent, 4
bind = $mod+Shift, 5, movetoworkspacesilent, 5
bind = $mod+Shift, 6, movetoworkspacesilent, 6
bind = $mod+Shift, 7, movetoworkspacesilent, 7
bind = $mod+Shift, 8, movetoworkspacesilent, 8
bind = $mod+Shift, 9, movetoworkspacesilent, 9
bind = $mod+Shift, 0, movetoworkspacesilent, 10

# Workspace navigation
bind = $mod, mouse_up, workspace, +1
bind = $mod, mouse_down, workspace, -1
bind = Ctrl+$mod, Right, workspace, r+1
bind = Ctrl+$mod, Left, workspace, r-1
bind = $mod, Page_Down, workspace, +1
bind = $mod, Page_Up, workspace, -1

# Special workspace (scratchpad)
bind = $mod, S, togglespecialworkspace,
bind = $mod+Alt, S, movetoworkspacesilent, special

# Volume
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.5
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Media
bindl = $mod+Shift, N, exec, playerctl next
bindl = $mod+Shift, B, exec, playerctl previous
bindl = $mod+Shift, P, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause

# Screenshot
bindl = , Print, exec, grim - | wl-copy
bind = $mod+Shift, S, exec, grim -g "$(slurp)" - | wl-copy

# Session
bind = $mod+Shift, M, exit,
bind = $mod, BackSpace, exec, loginctl lock-session
bindl = $mod+Shift, BackSpace, exec, systemctl suspend
